<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Zepp Life 刷步报告</title>
  <link rel="stylesheet" href="{{plgPath}}/resources/css/report.css">
</head>
<body>
  <div class="container {{statusClass}}">
    <!-- Header -->
    <div class="header">
      <div class="title-container">
        <span class="icon">📊</span>
        <h1 class="title">Zepp Life 自动刷步汇报</h1>
        <span class="status-badge">{{statusText}}</span>
      </div>
      <div class="divider"></div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="details-list">
        <div class="detail-item">
          <span class="emoji">👤</span>
          <span class="label-text">绑定账号</span>
          <span class="colon">：</span>
          <span class="value">{{username}}</span>
        </div>
        <div class="detail-item">
          <span class="emoji">👟</span>
          <span class="label-text">同步步数</span>
          <span class="colon">：</span>
          <span class="value highlight">{{step}}</span>
        </div>
        <div class="detail-item">
          <span class="emoji">⏰</span>
          <span class="label-text">同步时间</span>
          <span class="colon">：</span>
          <span class="value">{{time}}</span>
        </div>
      </div>
    </div>

    {{errorBlock}}

    <!-- Footer -->
    <div class="footer">
      <div class="divider"></div>
      <div class="footer-text">
        Zepp-Life-Plugin v{{version}} | 每日自动刷步助手
      </div>
    </div>
  </div>
</body>
</html>
