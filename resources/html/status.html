<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Zepp Life 绑定状态</title>
  <link rel="stylesheet" href="{{plgPath}}/resources/css/status.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="title-container">
        <span class="icon">📋</span>
        <h1 class="title">Zepp Life 绑定状态</h1>
      </div>
      <div class="divider"></div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Details List -->
      <div class="details-list">
        <div class="detail-item">
          <span class="label">账   号：</span>
          <span class="value">{{username}}</span>
        </div>
        <div class="detail-item">
          <span class="label">自动刷步：</span>
          <span class="value">{{autoStatus}}</span>
        </div>
        <div class="detail-item">
          <span class="label">自动步数：</span>
          <span class="value">{{customStepText}}</span>
        </div>
        <div class="detail-item">
          <span class="label">推送群聊：</span>
          <span class="value">{{pushGroupsText}}</span>
        </div>
        <div class="detail-item">
          <span class="label">推送好友：</span>
          <span class="value">{{pushFriendsText}}</span>
        </div>
        <div class="detail-item">
          <span class="label">上次同步：</span>
          <span class="value highlight">{{lastStep}}</span>
        </div>
      </div>

      <!-- Avatar Box -->
      <div class="avatar-container">
        <div class="avatar-box">
          <img class="avatar" src="http://q2.qlogo.cn/headimg_dl?dst_uin={{qq}}&spec=640" alt="Avatar">
        </div>
        <div class="qq-label">QQ: {{qq}}</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="divider"></div>
      <div class="tip-container">
        <span class="tip-icon">💡</span>
        <span class="tip-text">提示：您可以使用【#刷步设置】来修改设置</span>
      </div>
    </div>
  </div>
</body>
</html>
